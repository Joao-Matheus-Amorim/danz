# Schema de configuração YAML de cliente/grupo operacional
# Este arquivo é referência documental para configs em data/clients/**/*.yaml.
# O loader valida os campos obrigatórios em JavaScript.

id: string                  # slug único do arquivo, ex: dental-leads-sp
name: string                # nome exibido, ex: Dental Leads SP
companyId: string           # empresa mãe, ex: cmp_dental_leads
companyName: string         # nome da empresa mãe
segment: string             # ex: odontologia, ecommerce, imobiliaria
group: string               # ex: servicos, admin
state: string               # ex: SP, BA
timezone: string            # ex: America/Sao_Paulo
active: boolean

meta:
  mode: string              # shared_ad_account | dedicated
  adAccountId: string       # act_XXXXXXXXX
  insightLevel: string      # campaign | adset | ad
  unitMatchField: string    # campaign_name | campaign_id | adset_name | ad_name

sheets:
  spreadsheetId: string
  sheetName: string         # aba padrão/fallback, ex: SP · MAIO
  rowOffset: number         # offset para calcular linha do dia
  emptyMode: string         # zero | blank
  columnLayout:
    firstColumn: string     # C
    unitWidth: number       # 3
    fields: [string]        # leads, cpl, value

modules:
  pullMetaMetrics: boolean
  fillDentalSheet: boolean
  fillSheet: boolean
  sendWhatsappReport: boolean
  analyzeCreatives: boolean
  checkBalance: boolean
  uploadCreative: boolean
  createCampaign: boolean
  pauseAds: boolean

rules:
  maxCpl: number
  minCtr: number
  maxSpendWithoutLead: number
  minBalance: number

units:
  - key: string
    name: string
    city: string
    state: string
    campaignMatch:
      contains: [string]
      exact: [string]
      ids: [string]

notifications:
  whatsapp:
    enabled: boolean
    recipient: string       # número no formato 5511999999999
    deliveryMode: string    # none | log | notify | approval
